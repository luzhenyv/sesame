TRAIN:
  ENABLE: True
  DATASET: ava
  BATCH_SIZE: 8
  EVAL_PERIOD: 1
  CHECKPOINT_PERIOD: 1
  AUTO_RESUME: True
  #  STEPS_PER_EPOCH: 10
  #  VALIDATION_STEPS: 1
  # CHECKPOINT_FILE_PATH: path to the pretrain checkpoint file.
  MIXED_PRECISION: False
DATA:
  NUM_FRAMES: 16
  SAMPLING_RATE: 4
  TRAIN_JITTER_SCALES: [256, 320]
  TRAIN_CROP_SIZE: 224
  TEST_CROP_SIZE: 224
  INPUT_CHANNEL_NUM: [3, 3]
  PATH_TO_DATA_DIR: E:\datasets\ava
  TRAIN_JITTER_SCALES_RELATIVE: [ 0.08, 1.0 ]
  TRAIN_JITTER_ASPECT_RELATIVE: [ 0.75, 1.3333 ]
  INV_UNIFORM_SAMPLE: False
  RANDOM_FLIP: True
  REVERSE_INPUT_CHANNEL: False
AVA:
  ANNOTATION_DIR: E:\datasets\ava\parse demo
  TRAIN_GT_BOX_LISTS: ["ava_demo.csv",]
  IMG_PROC_BACKEND: pytorch
DETECTION:
  ENABLE: True
  ALIGNED: True
MVIT:
  ZERO_DECAY_POS_CLS: False
  POOL_FIRST: False
  SEP_POS_EMBED: True
  DEPTH: 16
  NUM_HEADS: 1
  EMBED_DIM: 96
  PATCH_2D: False
  PATCH_KERNEL: [3, 7, 7]
  PATCH_STRIDE: [2, 4, 4]
  PATCH_PADDING: [1, 3, 3]
  MLP_RATIO: 4.0
  QKV_BIAS: True
  DROPPATH_RATE: 0.2
  NORM_STEM: False
  NORM: "layernorm"
  MODE: "conv"
  CLS_EMBED_ON: True
  DIM_MUL: [[1, 2.0], [3, 2.0], [14, 2.0]]
  HEAD_MUL: [[1, 2.0], [3, 2.0], [14, 2.0]]
  POOL_KVQ_KERNEL: [3, 3, 3]
  POOL_KV_STRIDE_ADAPTIVE: [1, 8, 8]
  POOL_Q_STRIDE: [[1, 1, 2, 2], [3, 1, 2, 2], [14, 1, 2, 2]]
  DROPOUT_RATE: 0.0
BN:
  USE_PRECISE_STATS: False
  NUM_BATCHES_PRECISE: 200
  WEIGHT_DECAY: 0.0
SOLVER:
  ZERO_WD_1D_PARAM: True
  CLIP_GRAD_L2NORM: 1.0
  BASE_LR_SCALE_NUM_SHARDS: True
  BASE_LR: 1e-4
  COSINE_AFTER_WARMUP: True
  COSINE_END_LR: 1e-6
  WARMUP_START_LR: 1e-7
  WARMUP_EPOCHS: 30.0
  LR_POLICY: cosine
  MAX_EPOCH: 200
  MOMENTUM: 0.9
  DAMPENING: 0.0
  NESTEROV: True
  WEIGHT_DECAY: 0.05
  OPTIMIZING_METHOD: sgd
MODEL:
  ACT_CHECKPOINT: False
  HEAD_ACT: sigmoid
  NUM_CLASSES: 80
  ARCH: mvit
  MODEL_NAME: MViT
  LOSS_FUNC: soft_cross_entropy
  SINGLE_PATHWAY_ARCH: ["2d", "c2d", "i3d", "slow", "x3d", "mvit"]
  DROPOUT_RATE: 0.5
TENSORBOARD:
  ENABLE: True
TEST:
  ENABLE: True
  DATASET: ava
  BATCH_SIZE: 8
  NUM_SPATIAL_CROPS: 1
DATA_LOADER:
  NUM_WORKERS: 0
  PIN_MEMORY: True
DEMO:
  LABEL_FILE_PATH: E:\datasets\ava\ava_action_list.json
  INPUT_VIDEO: E:\datasets\ava\parse demo\_eBah6c5kyA.mkv
  GT_BOXES: E:\datasets\ava\parse demo\ava_demo.csv
  STARTING_SECOND: 900
NUM_GPUS: 1
NUM_SHARDS: 1
RNG_SEED: 0
LOG_PERIOD: 10
LOG_MODEL_INFO: True
OUTPUT_DIR: E:\demo